<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario carrinho</title>
</head>
<body>
    <form th:action="@{/cadastroCarrinho}" th:method="post">
        <label for="id">insira ID:</label>
        <input type="number" th:name="id">
        <br>
        <label for="nome">insira nome: </label>
        <input type="text" th:name="nome">
        <br>
        <label for="preco">insira preço:</label>
        <input type="number" th:name="preco" min="0.01" step="0.01">
        <br>
        <label for="quantidade">insira quantidade:</label>
        <input type="number" th:name="quantidade">
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
